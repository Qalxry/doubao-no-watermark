name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Body
        id: release_body
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          cat > /tmp/release-body.md <<EOF
          ## 📦 安装方式

          | 来源 | 链接 |
          |------|------|
          | **GreasyFork** | [豆包无水印图片下载](https://greasyfork.org/scripts/544607) |
          | **GitHub Release** | 见下方附件 (\`doubao_no_watermark.user.js\`) |

          ---

          ## 变更

          EOF
          if [ -n "$PREV_TAG" ]; then
            echo "从 $PREV_TAG 到 ${{ github.ref_name }} 的变更：" >> /tmp/release-body.md
            echo "" >> /tmp/release-body.md
            git log --oneline "$PREV_TAG"..HEAD | while read line; do
              msg=$(echo "$line" | sed 's/^[0-9a-f]\{7,9\} //')
              echo "- $msg" >> /tmp/release-body.md
            done
          else
            echo "首次发布" >> /tmp/release-body.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          files: doubao_no_watermark.user.js
