name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📦 安装方式

            | 来源 | 链接 |
            |------|------|
            | **GreasyFork** | [豆包无水印图片下载](https://greasyfork.org/scripts/544607) |
            | **GitHub Release** | 点击下方附件 (`doubao_no_watermark.user.js`) 即可触发安装 |

            ---
          generate_release_notes: true
          append_body: true
          files: doubao_no_watermark.user.js
